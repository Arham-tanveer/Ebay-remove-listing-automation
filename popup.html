<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Auto Delete Product Listing</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    width: 320px;
    padding: 14px;
    font-family: "Inter", sans-serif;
    background: #f7f8fa;
    color: #222;
    border-radius: 16px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
  }

  .filter-box {
    background: #fff;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    border: 1px solid #e5e5e5;
  }

  label {
    font-size: 13px;
    font-weight: 500;
  }

  .row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  select {
    width: 55px;
    padding: 8px;
    border: 1px solid #ddd;
    background: #efefef;
    border-radius: 8px;
    font-size: 13px;
    height: 38px;
  }

  /* PERFECT FLOATING LABEL — NO SIZE CHANGE */
  .float-group {
    position: relative;
    flex: 1;
  }

  .float-group input {
    width: 90%;
    height: 25px;
    padding: 10px 10px 0px 10px;
    border: 1px solid #ddd;
    background: #efefef;
    border-radius: 8px;
    font-size: 13px;
  }

  /* Label sits inside */
  .float-group label {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #777;
    font-size: 13px;
    pointer-events: none;
    transition: 0.2s ease;
    background: transparent;
  }

  /* When typing OR focus */
  .float-group input:focus + label,
  .float-group input:not(:placeholder-shown) + label {
    top: 4px;
    font-size: 10px;
    color: #333;
    background: #efefef;
    padding: 0 3px;
  }

  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
  }

  #applyFilters {
    background: #1a1a1a;
    color: white;
  }

  #startAutoEnd {
    background: #1a1a1a;
    color: white;
  }

  #startAutoEnd.stopMode {
    background: #d6453e;
  }

  #result {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }

  .ok { background: #e9f7ec; color: #1a7f37; display: block; }
  .err { background: #fdeaea; color: #c41e3a; display: block; }

  #status {
    margin-top: 8px;
    font-size: 12px;
    text-align: center;
    color: #666;
  }
</style>

</head>
<body>

<h2>Auto Delete Product Listing</h2>

<div class="filter-box">
  <label>Filters</label>


  <!-- Quantity -->
  <div class="row">
    <select id="qtyOp">
      <option value="<">&lt;</option>
      <!-- <option value="<="><=</option> -->
      <option value="=">=</option>
      <!-- <option value=">=">>=</option> -->
      <option value=">">&gt;</option>
    </select>

    <div class="float-group">
      <input type="number" id="qty" placeholder=" " />
      <label>Quantity</label>
    </div>
  </div>

  <!-- Views -->
  <div class="row">
    <select id="viewsOp">
      <option value="<">&lt;</option>
      <!-- <option value="<="><=</option> -->
        <option value="=">=</option>
        <!-- <option value=">=">>=</option> -->
      <option value=">">&gt;</option>
    </select>

    <div class="float-group">
      <input type="number" id="views" placeholder=" " />
      <label>Views</label>
    </div>
  </div>

  <!-- Watchers -->
  <div class="row">
    <select id="watchersOp">
      <option value="<">&lt;</option>
      <!-- <option value="<="><=</option> -->
        <option value="=">=</option>
        <!-- <option value=">=">>=</option> -->
      <option value=">">&gt;</option>
    </select>

    <div class="float-group">
      <input type="number" id="watchers" placeholder=" " />
      <label>Watchers</label>
    </div>
  </div>

  <!-- Sold -->
  <div class="row">
    <select id="soldOp">
      <option value="<">&lt;</option>
      <!-- <option value="<="><=</option> -->
        <option value="=">=</option>
        <!-- <option value=">=">>=</option> -->
      <option value=">">&gt;</option>
    </select>

    <div class="float-group">
      <input type="number" id="sold" placeholder=" " />
      <label>Sold</label>
    </div>
  </div>

  
  <!-- Days Left -->
  <div class="row">
    <select id="daysOp">
      <option value="<">&lt;</option>
      <!-- <option value="<="><=</option> -->
        <option value="=">=</option>
        <!-- <option value=">=">>=</option> -->
      <option value=">">&gt;</option>
    </select>

    <div class="float-group">
      <input type="number" id="days" placeholder=" " />
      <label>Days Left</label>
    </div>
  </div>
</div>

<button id="applyFilters">Apply Filters</button>
<button id="startAutoEnd">Start</button>

<div id="result"></div>
<div id="status"></div>

<script src="popup.js"></script>
</body>
</html>
